name: Lint and Build

on:
  pull_request:
    branches: [master]
  push:
  release:
    types:
      - created

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit
        run: uv run pre-commit run --verbose --all-files

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - run: uv build

  deploy:
    name: Deploy to PyPi
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
    if: ${{ github.event_name == 'release' && github.event.action == 'created' }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - run: uv build

      - run: uv publish --token ${{ secrets.PYPI_DEPLOY_TOKEN }}
